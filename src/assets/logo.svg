<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <rect width="200" height="200" fill="#b8cbd0"/>
  <style>
    .line { stroke: #137c8b; stroke-width: 0.5; opacity: 0.3; }
    .main-line { stroke: #137c8b; stroke-width: 2.5; fill: none; stroke-linejoin: round; }
    .node { fill: #137c8b; }
  </style>
  <g transform="translate(50, 50)">
    <line class="line" x1="50" y1="50" x2="75" y2="100" />
    <line class="line" x1="50" y1="50" x2="25" y2="100" />
    <line class="line" x1="50" y1="50" x2="50" y2="100" />
    <line class="line" x1="0" y1="0" x2="75" y2="100" />
    <line class="line" x1="100" y1="0" x2="25" y2="100" />

    <path class="main-line" d="M 25,100 L 75,100" />
    <path class="main-line" d="M 25,100 L 0,0 L 50,50 L 100,0 L 75,100" />
    <path class="main-line" d="M 0,0 L 50,100 L 100,0" />

    <circle class="node" cx="0" cy="0" r="4"/>
    <circle class="node" cx="100" cy="0" r="4"/>
    <circle class="node" cx="50" cy="50" r="4"/>
    <circle class="node" cx="25" cy="100" r="4"/>
    <circle class="node" cx="75" cy="100" r="4"/>
    <circle class="node" cx="50" cy="100" r="4"/>
   

  </g>
</svg>